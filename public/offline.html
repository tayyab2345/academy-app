<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline - AcademyFlow</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f9f7;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --primary: #059669;
        --border: #d9e7e1;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(5, 150, 105, 0.14), transparent 32%),
          var(--bg);
        color: var(--text);
        font-family: "Segoe UI", Arial, sans-serif;
        padding: 24px;
      }

      .card {
        width: min(100%, 460px);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 28px;
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border-radius: 999px;
        background: rgba(5, 150, 105, 0.12);
        color: var(--primary);
        padding: 8px 14px;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      h1 {
        margin: 18px 0 10px;
        font-size: 28px;
        line-height: 1.1;
      }

      p {
        margin: 0 0 18px;
        color: var(--muted);
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 18px;
        border-radius: 12px;
        background: var(--primary);
        color: white;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="badge">AcademyFlow Offline</div>
      <h1>You’re offline right now</h1>
      <p>
        AcademyFlow needs a connection for live dashboards, uploads, finance,
        payroll, and secure documents. Reconnect and reopen the app to continue.
      </p>
      <a href="/">Try Again</a>
    </main>
  </body>
  </html>
